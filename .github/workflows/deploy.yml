name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secret is set
        run: |
          if [ -z "${{ secrets.APPS_SCRIPT_URL }}" ]; then
            echo "❌ ERROR: APPS_SCRIPT_URL secret is not set. Go to Settings → Secrets and variables → Actions and add it."
            exit 1
          else
            echo "✅ APPS_SCRIPT_URL secret is present (length: ${#APPS_SCRIPT_URL} chars)"
          fi
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}

      - name: Inject Apps Script URL secret
        # Replaces %%APPS_SCRIPT_URL%% placeholder with the real URL from Secrets
        run: |
          sed -i "s|%%APPS_SCRIPT_URL%%|${{ secrets.APPS_SCRIPT_URL }}|g" index.html
          echo "✅ Placeholder replaced. Verifying..."
          grep -o 'APPS_SCRIPT_URL.*' index.html | head -1 | sed 's/https:.*$/[URL INJECTED]/'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
